services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"

  vercel-blob-server:
    image: vercel-blob-server
    ports:
      - "9966:3000"
    volumes:
      - vercel-blob-store:/var/vercel-blob-store

volumes:
  minio-data: {}
  vercel-blob-store: {}
