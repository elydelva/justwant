sonar.projectKey=elydelva_justwant
sonar.organization=elydelva

sonar.projectName=justwant

# Sources
sonar.sources=packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts,**/generated/**

# Tests
sonar.tests=packages
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts
# Exclude e2e files: they use test.skipIf / helper-based registration that Sonar can't statically detect
sonar.test.exclusions=**/*.e2e.spec.ts,**/*sdk-e2e.spec.ts,**/e2e-matrix.spec.ts,**/channels.sdk-e2e.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# CPD (copy-paste detection) exclusions:
# Adapter files are structurally similar by design (same interface, different driver).
# E2e repository files are test-only and follow repetitive SQL patterns.
sonar.cpd.exclusions=\
  **/adapters/*.ts,\
  **/adapters/**/*.ts,\
  **/engines/**/*.ts,\
  **/e2e/*.ts,\
  **/scripts/*.mjs,\
  **/*.type-test.ts

# Fail the CI job if Quality Gate fails
sonar.qualitygate.wait=true
