sonar.projectKey=elydelva_justwant
sonar.organization=elydelva

sonar.projectName=justwant

# Sources
sonar.sources=packages
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.ts,**/*.spec.ts,**/generated/**

# Tests
sonar.tests=packages
sonar.test.inclusions=**/*.test.ts,**/*.spec.ts

# Coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8

# Fail the CI job if Quality Gate fails
sonar.qualitygate.wait=true
