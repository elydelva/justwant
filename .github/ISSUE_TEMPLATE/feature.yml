name: Feature / ADR
description: New feature tied to an ADR or a technical decision
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        Open an issue before starting work. If an ADR already exists, link it below.

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What need or technical decision motivates this issue? If it maps to an ADR, mention the number (e.g. ADR-003).
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What this issue must accomplish, in one or two sentences.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: false

  - type: input
    id: adr
    attributes:
      label: Related ADR
      placeholder: "ADR-XXX or none"
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How will we know it's done? Tests, observable behavior, etc.
      placeholder: |
        - [ ]
    validations:
      required: false
