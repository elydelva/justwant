name: Bug report
description: Unexpected behavior or regression
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in this form. Remove sections that don't apply.

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Describe what is currently happening.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe what should happen instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - OS:
        - Version / commit:
        - Command run:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocking
        - Major
        - Minor
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Related PR, ADR, screenshot, etc.
    validations:
      required: false
