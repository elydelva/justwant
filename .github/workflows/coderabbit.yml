name: CodeRabbit Review

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  trigger-review:
    name: Trigger CodeRabbit
    runs-on: ubuntu-latest
    # Only run when CI succeeded on a PR (not on direct pushes to main)
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request'
    permissions:
      pull-requests: write

    steps:
      - name: Post @coderabbitai review comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const headBranch = context.payload.workflow_run.head_branch;
            const headSha = context.payload.workflow_run.head_sha;

            // Find the open PR matching this workflow run
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
            });

            const pr = prs.find((p) => p.head.sha === headSha);
            if (!pr) {
              core.info("No open PR found for this workflow run — skipping.");
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body: "@coderabbitai review",
            });

            core.info(`Triggered CodeRabbit review on PR #${pr.number}`);
