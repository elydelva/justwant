name: CI

on:
  push:
    branches: [main]          # Run after merge to main
  pull_request:
    branches: [main]          # Run on every PR — avoids duplicate runs on feature branches

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Lint & Format ────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Biome lint
        run: bun biome lint .
      - name: Biome format check
        run: bun biome format .

  # ── Type check ───────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Turborepo
        uses: rharkor/caching-for-turbo@0abc2381e688c4d2832f0665a68a01c6e82f0d6c # v2.3.11
      # turbo typecheck: builds deps first (^build), then typechecks each package.
      # Cache hits skip unchanged packages entirely.
      - name: Typecheck (turbo)
        run: bunx turbo typecheck

  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Turborepo
        uses: rharkor/caching-for-turbo@0abc2381e688c4d2832f0665a68a01c6e82f0d6c # v2.3.11
      # Build all packages via turbo — cache hits skip unchanged packages
      - name: Build all packages (turbo)
        run: bunx turbo build
      # prisma generate is normally run via packages/db pretest script, but bun test
      # at the root does not invoke per-package pretest hooks
      - name: Generate Prisma client
        run: |
          bun run --cwd packages/db prisma generate
          # Bun deduplicates packages in node_modules/.bun — sync the generated
          # client there so imports from test files resolve the real implementation
          for dir in node_modules/.bun/@prisma+client*/node_modules/.prisma; do
            mkdir -p "$dir/client"
            cp -r packages/db/node_modules/.prisma/client/. "$dir/client/"
          done
      - name: Push Prisma schema to SQLite test db
        run: bun run --cwd packages/db prisma db push --skip-generate
        env:
          DATABASE_URL: file:./test.db
      # Coverage reporters (text + lcov) and threshold are set in bunfig.toml.
      # Threshold is commented out there — enforced by SonarCloud Quality Gate instead.
      - name: Run tests with coverage
        run: bun test --coverage
        env:
          DATABASE_URL: file:./packages/db/test.db
      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  # ── Dependency audit ─────────────────────────────────────────────────────────
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit dependencies
        run: bun audit --audit-level=critical

  # ── Dead code detection (Knip) ───────────────────────────────────────────────
  dead-code:
    name: Dead Code (Knip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Knip — find unused exports, files & deps
        run: bunx knip --reporter compact

  # ── SonarCloud ───────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test]
    # Skip on forked PRs — SONAR_TOKEN is not available in that context
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.id == github.event.pull_request.base.repo.id
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Required for blame & new-code detection
      - name: Download coverage report
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage
          path: coverage/
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@383f7e52eae3ab0510c3cb0e7d9d150bbaeab838 # v3.1.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ── CodeRabbit ───────────────────────────────────────────────────────────────
  coderabbit:
    name: CodeRabbit Review
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, audit, dead-code, build]
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Trigger CodeRabbit review
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "@coderabbitai review",
            });

  # ── Build ────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: ".bun-version"
      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Cache Turborepo
        uses: rharkor/caching-for-turbo@0abc2381e688c4d2832f0665a68a01c6e82f0d6c # v2.3.11
      - name: Build all packages (turbo)
        run: bunx turbo build
